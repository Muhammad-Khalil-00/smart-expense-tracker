name: expense_tracker
description: "Smart Expense Tracker & Personal Finance Manager - Teyzix Core Internship Task MAD-1"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Local database (offline storage)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # Authentication (password hashing) & unique IDs
  crypto: ^3.0.3
  uuid: ^4.4.2

  # Session persistence
  shared_preferences: ^2.3.2

  # Charts for analytics dashboard
  fl_chart: ^0.69.0

  # Date formatting
  intl: ^0.19.0

  # Local notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Hive code generation
  hive_generator: ^2.0.1
  build_runner: ^2.4.12

flutter:
  uses-material-design: true